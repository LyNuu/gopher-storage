name: Auth Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
      - '.github/workflows/auth-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'

jobs:
  lint-and-test:
    name: Tooling & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: auth-service/go.sum

      - name: Go Mod Tidy
        run: |
          cd auth-service
          go mod tidy
          git diff --exit-code

      - name: Run Golangci-lint
        run: |
          cd auth-service
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.60.3
          golangci-lint run --timeout=5m

      - name: Run Unit Tests
        run: |
          cd auth-service
          go test -v -race -coverprofile=coverage.out ./...