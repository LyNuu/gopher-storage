name: Storage Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'storage-service/**'
      - '.github/workflows/storage-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'storage-service/**'

jobs:
  lint-and-test:
    name: Tooling & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache-dependency-path: storage-service/go.sum

      - name: Go Mod Tidy
        run: |
          cd storage-service
          go mod tidy
          git diff --exit-code

      - name: Run Golangci-lint
        run: |
          cd storage-service
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./... --timeout=5m

      - name: Run Unit Tests
        run: |
          cd storage-service
          go test -v -race -coverprofile=coverage.out ./...